name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify spidermonkey.go attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bridge file (release attestation)
        run: make verify

  test:
    name: Go test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
